<!DOCTYPE html> 
<html>
    <meta charset="UTF-8">
    <head>
        <title>Recipe Finder</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
  <h1>Recipe Finder</h1>
  <div class="selection-label">Your Ingredients</div>
  <div class="ingredient-grid" id="grid"></div>
  <button id="find-btn" onclick="findRecipes()">Find Recipes</button>
  <p class="selection-label">Choose any ingredients that you have currently at home, and the website will come up with ideas for dinner, lunch, or breakfast, so it fits your ingredients!</p>
  <div id="status"></div>
  <div id="results"></div>
 
  <script src="script.js"></script>
    </body>
</html>
