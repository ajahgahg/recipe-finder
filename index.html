<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Finder</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>🍽️ Recipe Finder</h1>

    <p class="selection-label">
      Search ingredients to begin
    </p>

    <input
      type="text"
      id="ingredient-search"
      placeholder="Search ingredients..."
      autocomplete="off"
    />

    <!-- Selected ingredients -->
    <div id="selected-container"></div>

    <!-- Search results -->
    <div id="ingredients-container"></div>

    <button id="find-btn" onclick="findRecipes()">
      Find Recipes
    </button>

    <div id="status"></div>

    <!-- Recipe cards -->
    <div id="results"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
